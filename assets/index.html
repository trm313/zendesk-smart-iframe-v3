<html lang="en">

    <!-- Zendesk Garden CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/combine/npm/@zendeskgarden/css-bedrock@7.0.21,npm/@zendeskgarden/css-utilities@4.3.0"
    />

    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <div class="app-wrapper">

      <div id="no-zaf-warning" class="no-zaf-warning" style="display: none;">
        No Zendesk API found. Developer mode engaged.
      </div>

      <div class="browser">
        <div class="browser-header">
          <div class="url-bar-wrapper">
            <div id="url-display" class="url-display" title="">Loading...</div>
          </div>
          <div class="browser-actions">

            <!-- Reload -->
            <button id="btn-reload" class="icon-btn" title="Reload">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
                <path d="M21 3v5h-5"/>
              </svg>
            </button>

            <!-- Copy URL -->
            <button id="btn-copy" class="icon-btn" title="Copy URL">
              <svg id="icon-copy" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="8" height="4" x="8" y="2" rx="1" ry="1"/>
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
              </svg>
              <svg id="icon-copied" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                <rect width="8" height="4" x="8" y="2" rx="1" ry="1"/>
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                <path d="m9 14 2 2 4-4"/>
              </svg>
            </button>

            <!-- Open in new tab -->
            <a id="btn-open" href="#" target="_blank" rel="noopener noreferrer" title="Open in new tab" class="icon-btn-link">
              <button class="icon-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M15 3h6v6"/>
                  <path d="M10 14 21 3"/>
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                </svg>
              </button>
            </a>

          </div>
        </div>

        <div class="iframe-wrapper">
          <iframe
            id="embedded-iframe"
            title="Embedded Site"
            sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
            frameborder="1"
          ></iframe>
        </div>
      </div>

    </div>

    <script src="app.js"></script>
  </body>
</html>
